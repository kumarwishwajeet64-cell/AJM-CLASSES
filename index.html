<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AJM CLASSES</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

  <div class="logo">
    AJM <span>CLASSES</span>
  </div>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Courses</a>
    <a href="#">PDF</a>
    <a href="#">Contact</a>
  </div>

</div>

<!-- LOGIN REGISTER -->

<div class="container">

  <!-- LOGIN -->

  <div class="box">

    <h2>Sign In</h2>

    <input type="text" placeholder="Enter Username">

    <input type="password" placeholder="Enter Password">

    <button>Login</button>

  </div>

  <!-- REGISTER -->

  <div class="box">

    <h2>Register</h2>

    <input type="text" placeholder="Full Name">

    <input type="email" placeholder="Email">

    <input type="password" placeholder="Password">

    <button>Register</button>

  </div>

</div>

</body>
</html>
